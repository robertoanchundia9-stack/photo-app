<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zara Marina Varela</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff00ff">
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Setup Profile Modal -->
    <div id="profile-modal" class="modal active">
        <div class="modal-content glass">
            <h2>Bienvenido</h2>
            <p>Configura tu perfil para empezar.</p>
            <div class="profile-setup-grid">
                <div class="profile-pic-setup">
                    <label for="profile-pic-input" class="profile-pic-label" id="profile-pic-preview">
                        <span>📷</span>
                    </label>
                    <input type="file" id="profile-pic-input" accept="image/*" style="display: none;">
                </div>
                <div class="profile-info-setup">
                    <input type="text" id="firstname-input" placeholder="Nombre">
                    <input type="text" id="lastname-input" placeholder="Apellido">
                </div>
            </div>
            <button id="save-profile-btn" class="btn primary">Empezar</button>
        </div>
    </div>

    <!-- Viewer Modal -->
    <div id="viewer-modal" class="modal">
        <div class="modal-content glass viewer-content">
            <button id="close-viewer-btn" class="close-btn">&times;</button>
            <div id="viewer-media-container"></div>
            <a id="download-btn" class="btn primary" href="#" download>Descargar</a>
        </div>
    </div>

    <div class="app-layout">
        <!-- Main Content (Gallery) -->
        <main id="gallery-section" class="gallery-section">
            <header class="glass-header">
                <div style="display: flex; align-items: center; gap: 0.5rem;">
                    <h1 class="neon-title">✨ Zara Marina Varela</h1>
                    <div class="header-tools">
                        <button id="theme-toggle" class="btn secondary" title="Cambiar Tema">☀️</button>
                        <button id="fullscreen-btn" class="btn secondary" title="Pantalla Completa">📺</button>
                        <button id="install-app-btn" class="btn secondary" style="display: none;">🔽</button>
                    </div>
                </div>
                <div class="header-actions">
                    <label class="btn primary upload-btn">
                        Subir Archivo
                        <input type="file" id="upload-input" accept="image/*,video/mp4" style="display: none;">
                    </label>
                </div>
            </header>
            <div id="gallery-grid" class="gallery-grid">
                <!-- Media items will be injected here -->
            </div>
        </main>

        <!-- Blog Section -->
        <main id="blog-section" class="blog-section hidden">
            <header class="glass-header">
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <h1 class="neon-title">📖 Zara Marina Varela</h1>
                    <button id="back-to-gallery-btn" class="btn secondary" style="padding: 0.5rem 1rem; font-size: 0.8rem;">⬅️ Volver</button>
                </div>
            </header>
            <div class="blog-container">
                <div class="create-post-card glass">
                    <textarea id="blog-text-input" placeholder="Escribe algo increíble..." rows="3"></textarea>
                    <div class="post-actions" style="display: flex; justify-content: space-between; align-items: center; margin-top: 1rem;">
                        <div style="display: flex; align-items: center;">
                            <label class="btn secondary" style="padding: 0.5rem 1rem;">
                                📷 Adjuntar
                                <input type="file" id="blog-media-input" accept="image/*,video/mp4" style="display: none;">
                            </label>
                            <span id="blog-media-name" style="font-size: 0.8rem; margin-left: 0.5rem; color: #aaa;"></span>
                        </div>
                        <button id="submit-post-btn" class="btn primary" style="padding: 0.5rem 2rem;">Publicar</button>
                    </div>
                </div>
                <div id="blog-feed" class="blog-feed">
                    <!-- Blog posts will be injected here -->
                </div>
            </div>
        </main>

        <!-- Sidebar Chat -->
        <aside id="chat-sidebar" class="chat-sidebar glass">
            <div class="chat-header">
                <h2>Chat Local</h2>
                <button id="close-chat-btn" class="close-btn">&times;</button>
            </div>
            <div id="chat-messages" class="chat-messages">
                <!-- Messages -->
            </div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Escribe un mensaje...">
                <button id="send-msg-btn" class="btn primary">Enviar</button>
            </div>
        </aside>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav glass">
            <button id="nav-gallery" class="nav-item active">
                <span class="nav-icon">✨</span>
                <span class="nav-label">Galería</span>
            </button>
            <button id="nav-blog" class="nav-item">
                <span class="nav-icon">📖</span>
                <span class="nav-label">Blog</span>
            </button>
            <button id="nav-chat" class="nav-item">
                <span class="nav-icon">💬</span>
                <span class="nav-label">Chat</span>
            </button>
        </nav>
    </div>

    <!-- Socket.io -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
            .then(() => console.log('Service Worker Registrado'));
        }
    </script>
</body>
</html>
